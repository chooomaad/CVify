workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic2

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.choumad.cvify

    # Only cache pub packages — NOT CocoaPods.
    # Caching ~/Library/Caches/CocoaPods caused stale Pods project files
    # (xcodeproj) to be reused across builds, making pod install a no-op
    # in ~1 s and leaving old privacy-bundle references in place.
    # A fresh pod install takes ~25 s and is required for post_install
    # hooks (MACH_O_TYPE, CODE_SIGNING_ALLOWED, etc.) to take effect.
    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: Flutter clean
        script: |
          flutter clean

      - name: Set unique iOS build number
        script: |
          chmod +x scripts/ci_set_build_number.sh
          ./scripts/ci_set_build_number.sh

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Flutter analyze
        script: |
          flutter analyze

      - name: Clean Xcode DerivedData
        script: |
          # DerivedData persists across builds on the same Codemagic machine.
          # A stale cache causes xcodebuild archive to complete in ~3 s using
          # old object files that reference non-existent privacy-bundle binaries,
          # producing "Build input file cannot be found" errors.
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build App Store IPA (Release)
        script: |
          # xcode-project build-ipa always builds Release — never --debug.
          # It calls xcodebuild archive + exportArchive directly (not flutter build ipa).
          xcode-project build-ipa \
            --workspace ios/Runner.xcworkspace \
            --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration


  web-release:
    name: Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build web
        script: |
          flutter build web --release

    artifacts:
      - build/web/
