workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic2

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.choumad.cvify

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Configure code signing
        script: |
          xcode-project use-profiles

      - name: Build App Store IPA
        script: |
          flutter build ipa \
            --release \
            --export-method app-store

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration


  web-release:
    name: Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - flutter pub get
      - flutter build web --release

    artifacts:
      - build/web/