workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic2

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.choumad.cvify

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Flutter clean
        script: |
          flutter clean

      - name: Set unique iOS build number
        script: |
          chmod +x scripts/ci_set_build_number.sh
          ./scripts/ci_set_build_number.sh

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Flutter analyze
        script: |
          flutter analyze

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build App Store IPA
        script: |
          xcode-project build-ipa \
          --workspace ios/Runner.xcworkspace \
          --scheme Runner

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration


  web-release:
    name: Web Release
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: stable

    cache:
      cache_paths:
        - ~/.pub-cache

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Build web
        script: |
          flutter build web --release

    artifacts:
      - build/web/