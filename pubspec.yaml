name: cvify
description: "CVify - Professional CV & Resume Builder"
publish_to: 'none'
version: 1.0.2+13

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.2

  # Backend — Supabase (auth + database + storage)
  supabase_flutter: ^2.8.4

  # PDF generation
  pdf: ^3.11.0

  # Animations
  flutter_animate: ^4.5.0

  # Image picker
  image_picker: ^1.1.2

  # Utilities
  uuid: ^4.4.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.4.1
  intl: any

# path_provider_foundation 2.4.x (unified iOS/macOS Swift rewrite) causes
# EXC_BAD_ACCESS (SIGSEGV) in PathProviderPlugin.register(with:) on iOS 13
# Release builds. 2.3.2 is the last stable pre-refactor version.
dependency_overrides:
  path_provider_foundation: 2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#0B1220"
    theme_color: "#4F63AC"
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/
