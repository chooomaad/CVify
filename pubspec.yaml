name: cvify
description: "CVify - Professional CV & Resume Builder"
publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF generation
  pdf: ^3.11.0
  #printing: ^5.13.1

  # Animations
  flutter_animate: ^4.5.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Image picker
  image_picker: ^1.1.2

  # Utilities
  uuid: ^4.4.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2
  smooth_page_indicator: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#0B1220"
    theme_color: "#4F63AC"
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
